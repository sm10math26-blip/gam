<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G10 Quiz Adventure Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  overflow:hidden;
  color:white;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  background:linear-gradient(#1e293b,#0f172a);
}

#player{
  position:absolute;
  width:50px;
  height:50px;
  background:#38bdf8;
  border-radius:10px;
  left:100px;
  top:300px;
}

.box{
  position:absolute;
  width:55px;
  height:55px;
  background:#f59e0b;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  font-weight:bold;
}

.coin{
  position:absolute;
  width:25px;
  height:25px;
  background:gold;
  border-radius:50%;
}

#hud{
  position:absolute;
  top:10px;
  left:10px;
  font-size:18px;
}

#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}

#card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:300px;
}

.btn{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#334155;
  border:none;
  color:white;
  border-radius:8px;
}

.btn:hover{background:#475569;}

#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

.cbtn{
  width:70px;
  height:70px;
  border-radius:50%;
  font-size:25px;
}
</style>
</head>

<body>

<div id="game">

<div id="hud">
❤️ <span id="hp">3</span> |
⭐ <span id="score">0</span> |
🪙 <span id="coins">0</span>
</div>

<div id="player"></div>

<div class="box" style="left:400px;top:250px">?</div>
<div class="box" style="left:700px;top:250px">?</div>
<div class="box" style="left:1000px;top:250px">?</div>

<div class="coin" style="left:500px;top:200px"></div>
<div class="coin" style="left:850px;top:180px"></div>

</div>

<div id="modal">
  <div id="card">
    <h3 id="q"></h3>
    <div id="opt"></div>
    <p id="msg"></p>
  </div>
</div>

<div id="controls">
<button class="cbtn" onclick="left()">⬅</button>
<button class="cbtn" onclick="jump()">⤒</button>
<button class="cbtn" onclick="right()">➡</button>
</div>

<script>
let player = document.getElementById("player");
let hpEl = document.getElementById("hp");
let scoreEl = document.getElementById("score");
let coinEl = document.getElementById("coins");

let modal = document.getElementById("modal");
let qEl = document.getElementById("q");
let optEl = document.getElementById("opt");
let msg = document.getElementById("msg");

let x=100, y=300, vy=0;
let gravity=0.8;
let onGround=true;

let hp=3, score=0, coins=0;
let paused=false;

let questions=[
 {q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:"H2O"},
 {q:"Respiration gas?",o:["Oxygen","Hydrogen","Helium","Nitrogen"],a:"Oxygen"},
 {q:"2+2×3?",o:["12","10","8","6"],a:"8"}
];

function update(){
  player.style.left=x+"px";
  player.style.top=y+"px";
}

function left(){ if(!paused) x-=20; }
function right(){ if(!paused) x+=20; }

function jump(){
  if(onGround){
    vy=-12;
    onGround=false;
  }
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") left();
  if(e.key==="ArrowRight") right();
  if(e.key===" ") jump();
});

function physics(){
  vy+=gravity;
  y+=vy;

  if(y>=300){
    y=300;
    vy=0;
    onGround=true;
  }
}

function checkBoxes(){
  document.querySelectorAll(".box").forEach((b,i)=>{
    let bx=b.getBoundingClientRect().left;
    let px=player.getBoundingClientRect().left;

    if(Math.abs(px-bx)<40 && b.style.display!=="none"){
      openQ(i,b);
    }
  });
}

function checkCoins(){
  document.querySelectorAll(".coin").forEach(c=>{
    let cx=c.getBoundingClientRect().left;
    let px=player.getBoundingClientRect().left;

    if(Math.abs(px-cx)<30){
      coins++;
      coinEl.innerText=coins;
      c.style.display="none";
    }
  });
}

function getQ(){
  return questions[Math.floor(Math.random()*questions.length)];
}

function openQ(i,box){
  paused=true;

  let q=getQ();

  qEl.innerText=q.q;
  optEl.innerHTML="";
  msg.innerText="";

  q.o.forEach(op=>{
    let btn=document.createElement("button");
    btn.className="btn";
    btn.innerText=op;

    btn.onclick=()=>{

      if(op===q.a){
        score+=10;
        scoreEl.innerText=score;
        msg.innerText="Correct!";
        box.style.display="none";
      }else{
        hp--;
        hpEl.innerText=hp;
        msg.innerText="Wrong!";
      }

      setTimeout(()=>{
        modal.style.display="none";
        paused=false;
      },700);

      if(hp<=0){
        alert("Game Over");
        location.reload();
      }
    };

    optEl.appendChild(btn);
  });

  modal.style.display="flex";
}

function loop(){
  if(!paused){
    physics();
    checkBoxes();
    checkCoins();
  }

  update();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
